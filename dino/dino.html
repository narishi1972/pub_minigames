<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Dino Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 14px;
      user-select: none;
    }
    canvas { display: block; border-radius: 10px; }
    #keys { color: #555; font: 13px/1 'Courier New', monospace; }
    #keys b { color: #8df; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<p id="keys"><b>SPACE</b> / <b>↑</b> ジャンプ &nbsp; <b>ENTER</b> スタート / リスタート</p>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = Math.min(window.innerWidth - 32, 900);
const H = 280;
canvas.width  = W;
canvas.height = H;

// ── Constants ─────────────────────────────────────────────
const P  = 5;            // pixel-art unit (px per grid cell)
const GY = H - 54;      // top of ground
const DINO_LEFT = 60;   // dino's fixed left edge
const DINO_W    = 10*P; // 50px
const DINO_H    = 13*P; // 65px
const GRAVITY   = 1800; // px/s²
const JUMP_V    = -600; // initial jump velocity (px/s)

// ── Dino ──────────────────────────────────────────────────
// Grid: 10 cols × 13 rows, each cell P×P px. Facing right.
//
//  Head  : cols 3-9, rows 0-4
//  Body  : cols 0-8, rows 3-8
//  Tail  : cols 0-1, rows 5-7
//  Legs  : animated, rows 9-12
//
function drawDino(bx, by, legFrame, dead, night) {
  const s = P;
  ctx.fillStyle = night ? '#aaa' : '#444';

  // Head
  ctx.fillRect(bx+3*s, by,       7*s, 5*s);
  // Upper body
  ctx.fillRect(bx,     by+3*s,   9*s, 3*s);
  // Lower body
  ctx.fillRect(bx+s,   by+6*s,   8*s, 2*s);
  ctx.fillRect(bx+2*s, by+8*s,   6*s,   s);
  // Tail
  ctx.fillRect(bx,     by+5*s,   2*s, 3*s);

  // Legs & feet
  ctx.fillRect(bx+2*s, by+9*s,   2*s, 2*s); // left thigh
  ctx.fillRect(bx+5*s, by+9*s,   2*s, 2*s); // right thigh
  if (legFrame === 0) {
    ctx.fillRect(bx+s,   by+11*s, 3*s, s);   // left foot (back)
    ctx.fillRect(bx+5*s, by+11*s, 4*s, s);   // right foot (fwd)
  } else if (legFrame === 1) {
    ctx.fillRect(bx+2*s, by+11*s, 4*s, s);   // left foot (fwd)
    ctx.fillRect(bx+6*s, by+11*s, 3*s, s);   // right foot (back)
  } else {
    ctx.fillRect(bx+2*s, by+11*s, 2*s, s);
    ctx.fillRect(bx+5*s, by+11*s, 2*s, s);
  }

  // Eye white
  ctx.fillStyle = 'white';
  ctx.fillRect(bx+6*s, by+s, s, s);

  if (!dead) {
    ctx.fillStyle = '#111';
    ctx.fillRect(bx+6*s+2, by+s+2, s-3, s-3);
  } else {
    // × eye
    ctx.fillStyle = '#e33';
    ctx.font = `bold ${s+1}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('×', bx+6*s-1, by+2*s+1);
  }
}

function dinoBounds(by) {
  return { x: DINO_LEFT+P, y: by, w: 8*P, h: 9*P };
}

// ── Cacti ────────────────────────────────────────────────
// Rects relative to (obstacleX, GY). y is negative = above ground.
const CACTI = [
  {
    rects: [
      {x:6,  y:-50, w:11, h:50},
      {x:0,  y:-34, w:6,  h:10},
      {x:17, y:-38, w:6,  h:14},
      {x:0,  y:-46, w:6,  h:12},
      {x:17, y:-50, w:6,  h:12},
    ],
    hw: 23, hh: 50,
  },
  {
    rects: [
      {x:7,  y:-70, w:11, h:70},
      {x:0,  y:-52, w:7,  h:11},
      {x:18, y:-56, w:7,  h:15},
      {x:0,  y:-64, w:7,  h:12},
    ],
    hw: 25, hh: 70,
  },
  {
    rects: [
      {x:2,  y:-54, w:10, h:54},
      {x:0,  y:-36, w:2,  h:9},
      {x:12, y:-40, w:2,  h:13},
      {x:22, y:-50, w:10, h:50},
      {x:20, y:-32, w:2,  h:9},
      {x:32, y:-36, w:2,  h:12},
    ],
    hw: 34, hh: 54,
  },
];

function drawCactus(type, bx) {
  const highlight = 'rgba(255,255,255,0.1)';
  ctx.fillStyle = '#3d7a3d';
  for (const r of CACTI[type].rects) {
    ctx.fillRect(bx+r.x, GY+r.y, r.w, r.h);
    ctx.fillStyle = highlight;
    ctx.fillRect(bx+r.x, GY+r.y, 2, r.h);
    ctx.fillStyle = '#3d7a3d';
  }
}

// ── Clouds ────────────────────────────────────────────────
let clouds = [];

function newCloud(randomX) {
  return {
    x:   randomX ? Math.random()*W : W+10,
    y:   16 + Math.random()*55,
    w:   55 + Math.random()*75,
    spd: 25 + Math.random()*20,
  };
}

function initClouds() {
  clouds = Array.from({length:5}, () => newCloud(true));
}

function drawCloud({x, y, w}) {
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  rrect(x,          y+5,      w,        16, 8);
  rrect(x+w*0.15,   y,        w*0.45,   18, 9);
  rrect(x+w*0.5,    y+2,      w*0.35,   14, 7);
}

// ── Ground texture ────────────────────────────────────────
let groundDots = [];
const SPAN = W * 3;

function initGroundTexture() {
  groundDots = Array.from({length:80}, () => ({
    x: Math.random() * SPAN,
    y: GY + 4 + Math.random() * 22,
    w: 2 + Math.random() * 12,
    h: 1 + Math.random() * 2,
  }));
}

function drawGroundTexture(off) {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  const o = off % SPAN;
  for (const d of groundDots) {
    const gx = ((d.x - o) % SPAN + SPAN) % SPAN;
    if (gx < W + 20) ctx.fillRect(gx, d.y, d.w, d.h);
  }
}

// ── State ─────────────────────────────────────────────────
let state    = 'idle';
let score    = 0, hiScore = 0;
let speed    = 290;      // px/s
let dinoY    = GY;      // bottom of dino (feet level)
let dinoVY   = 0;
let onGround = true;
let legFrame = 0, legTimer = 0;
let obstacles    = [];  // {x, type}
let spawnTimer   = 0, spawnInterval = 1.6;
let groundOffset = 0;
let nightMode    = false;
let hiFlash      = 0;   // seconds remaining for hi-score flash
let rafId = null, lastTime = null;

// ── Input ─────────────────────────────────────────────────
const held = new Set();
document.addEventListener('keydown', e => {
  if (['Space','ArrowUp','Enter'].includes(e.code)) e.preventDefault();
  if (held.has(e.code)) return;
  held.add(e.code);
  onKey(e.code);
});
document.addEventListener('keyup', e => held.delete(e.code));
canvas.addEventListener('touchstart', e => { e.preventDefault(); onKey('Space'); }, {passive:false});

function onKey(code) {
  if (!['Space','ArrowUp','Enter'].includes(code)) return;
  if (state !== 'playing') {
    startGame();
  } else if (onGround) {
    dinoVY = JUMP_V;
    onGround = false;
  }
}

// ── Game ──────────────────────────────────────────────────
function startGame() {
  score = 0; speed = 290;
  dinoY = GY; dinoVY = 0; onGround = true;
  legFrame = 0; legTimer = 0; hiFlash = 0;
  obstacles = []; spawnTimer = 0; spawnInterval = 1.6;
  groundOffset = 0; nightMode = false;
  initClouds();
  initGroundTexture();
  state = 'playing';
  if (rafId) cancelAnimationFrame(rafId);
  lastTime = null;
  rafId = requestAnimationFrame(mainLoop);
}

function mainLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (state === 'playing') update(dt);
  draw();
  rafId = requestAnimationFrame(mainLoop);
}

function update(dt) {
  // Physics
  if (!onGround) {
    dinoVY += GRAVITY * dt;
    dinoY  += dinoVY * dt;
    if (dinoY >= GY) { dinoY = GY; dinoVY = 0; onGround = true; }
  }

  // Leg animation
  if (onGround) {
    legTimer += dt;
    if (legTimer > 0.085) { legFrame ^= 1; legTimer = 0; }
  }

  // Scroll
  groundOffset += speed * dt;

  // Clouds (parallax)
  for (const c of clouds) {
    c.x -= c.spd * dt;
    if (c.x + c.w < 0) Object.assign(c, newCloud(false));
  }

  // Obstacles
  for (const ob of obstacles) ob.x -= speed * dt;
  obstacles = obstacles.filter(ob => ob.x + 80 > 0);
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    obstacles.push({ x: W+20, type: Math.floor(Math.random()*CACTI.length) });
    spawnTimer = 0;
    spawnInterval = Math.max(0.65, 1.6 - Math.floor(score)*0.0006);
  }

  // Score & speed
  const prev = Math.floor(score);
  score += speed * dt * 0.04;
  speed  = Math.min(850, 290 + Math.floor(score) * 0.4);
  nightMode = Math.floor(score / 600) % 2 === 1;

  if (Math.floor(score) > hiScore && prev <= hiScore && hiScore > 0) hiFlash = 1.5;
  if (hiFlash > 0) hiFlash -= dt;

  // Collision
  if (checkHit()) {
    if (Math.floor(score) > hiScore) hiScore = Math.floor(score);
    state = 'gameover';
  }
}

function checkHit() {
  const dinoTop = dinoY - DINO_H;
  const b = dinoBounds(dinoTop);
  for (const ob of obstacles) {
    const ct = CACTI[ob.type];
    const ox = ob.x + 3;
    const oy = GY - ct.hh;
    if (b.x < ox+ct.hw-3 && b.x+b.w > ox && b.y < oy+ct.hh && b.y+b.h > oy) return true;
  }
  return false;
}

// ── Draw ──────────────────────────────────────────────────
function draw() {
  // Sky
  ctx.fillStyle = nightMode ? '#090920' : '#c8e8ff';
  ctx.fillRect(0, 0, W, H);

  if (nightMode) {
    drawStars();
    drawMoon();
  } else {
    for (const c of clouds) drawCloud(c);
  }

  // Ground
  ctx.fillStyle = nightMode ? '#2a2a2a' : '#c2a870';
  ctx.fillRect(0, GY, W, H-GY);
  ctx.fillStyle = nightMode ? '#4a7040' : '#6ab83a';
  ctx.fillRect(0, GY, W, 6);
  drawGroundTexture(groundOffset);

  // Cacti
  for (const ob of obstacles) drawCactus(ob.type, ob.x);

  // Dino
  const dinoTop = dinoY - DINO_H;
  const lf = onGround ? legFrame : 2;
  drawDino(DINO_LEFT, dinoTop, lf, state === 'gameover', nightMode);

  // Score HUD
  const tc = nightMode ? '#ccc' : '#555';
  ctx.textAlign = 'right';
  ctx.font = 'bold 18px "Courier New",monospace';
  const flashOn = hiFlash > 0 && Math.floor(hiFlash*8) % 2 === 0;
  ctx.fillStyle = flashOn ? '#fc0' : tc;
  ctx.fillText(`HI ${pad(hiScore)}`, W-16, 30);
  ctx.fillStyle = tc;
  ctx.fillText(pad(Math.floor(score)), W-16, 52);

  // Overlay (idle / gameover)
  if (state !== 'playing') drawOverlay();
}

function drawStars() {
  const t = Date.now() * 0.001;
  for (let i = 0; i < 45; i++) {
    const sx = (i*199+23) % W;
    const sy = (i*137+11) % (GY-20);
    const a  = (Math.sin(t*1.5 + i*0.7) + 1) / 2 * 0.85;
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

function drawMoon() {
  const mx = W*0.82, my = 45;
  ctx.fillStyle = 'rgba(255,255,200,0.75)';
  ctx.beginPath(); ctx.arc(mx, my, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#090920';
  ctx.beginPath(); ctx.arc(mx+8, my-5, 14, 0, Math.PI*2); ctx.fill();
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  if (state === 'gameover') {
    ctx.font = 'bold 30px "Courier New",monospace';
    ctx.fillText('G A M E  O V E R', W/2, H/2-14);
  } else {
    ctx.font = 'bold 26px "Courier New",monospace';
    ctx.fillText('DINO RUNNER', W/2, H/2-16);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '15px "Courier New",monospace';
  ctx.fillText('SPACE / ENTER でスタート', W/2, H/2+16);
}

// ── Helpers ───────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);  ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);  ctx.arcTo(x, y+h,   x, y+h-r,  r);
  ctx.lineTo(x, y+r);    ctx.arcTo(x, y,     x+r, y,     r);
  ctx.closePath();
  ctx.fill();
}

function pad(n) { return String(n).padStart(5, '0'); }

// ── Boot ──────────────────────────────────────────────────
initClouds();
initGroundTexture();
rafId = requestAnimationFrame(mainLoop);
</script>
</body>
</html>
