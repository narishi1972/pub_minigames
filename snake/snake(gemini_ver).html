<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .info {
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>SNAKE GAME</h1>
        <p>操作: <b>カーソルキー</b> または <b>I, J, K, L</b></p>
        <h2 id="score">Score: 0</h2>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;

        // 初期位置
        let snake = [
            {x: 10, y: 10},
            {x: 10, y: 11},
            {x: 10, y: 12}
        ];

        let food = {x: 5, y: 5};

        // ゲームループの開始
        main();
        createFood();

        // メインループ
        function main() {
            if (didGameEnd()) {
                alert("ゲームオーバー！ スコア: " + score);
                document.location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // 速度（ミリ秒）
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#2ecc71" : "#27ae60";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 何も入力されていない時は動かない
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            const didEatFood = snake[0].x === food.x && snake[0].y === food.y;
            if (didEatFood) {
                score += 10;
                scoreElement.innerHTML = "Score: " + score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;
            
            // 壁に衝突
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;

            // 自分自身に衝突
            let hitSelf = false;
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    hitSelf = true;
                    break;
                }
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall || hitSelf;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // ヘビの体の上に生成されないかチェック
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // キーボード入力
        window.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.key;
            
            // 上下左右の判定（逆方向への移動を防止）
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === "ArrowUp" || keyPressed === "i" || keyPressed === "I") && !goingDown) {
                dx = 0; dy = -1;
            }
            if ((keyPressed === "ArrowDown" || keyPressed === "k" || keyPressed === "K") && !goingUp) {
                dx = 0; dy = 1;
            }
            if ((keyPressed === "ArrowLeft" || keyPressed === "j" || keyPressed === "J") && !goingRight) {
                dx = -1; dy = 0;
            }
            if ((keyPressed === "ArrowRight" || keyPressed === "l" || keyPressed === "L") && !goingLeft) {
                dx = 1; dy = 0;
            }
        }
    </script>
</body>
</html>
