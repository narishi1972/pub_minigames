<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Rogue</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
}

canvas {
    display: block;
    margin: auto;
    background: #000;
    image-rendering: pixelated;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const TILE = 32;
const MAP_W = 25;
const MAP_H = 18;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = MAP_W * TILE;
canvas.height = MAP_H * TILE;

const FLOOR = 0;
const WALL  = 1;

let running = true;

const map = [];

// ====================
// MAP GENERATION
// ====================
function generateMap() {

    for (let y = 0; y < MAP_H; y++) {

        map[y] = [];

        for (let x = 0; x < MAP_W; x++) {

            if (
                x === 0 ||
                y === 0 ||
                x === MAP_W - 1 ||
                y === MAP_H - 1
            ) {
                map[y][x] = WALL;
            }
            else {

                map[y][x] =
                    Math.random() < 0.18
                    ? WALL
                    : FLOOR;
            }
        }
    }

    map[2][2] = FLOOR;
}

generateMap();

// ====================
// PLAYER
// ====================
const player = {
    x: 2,
    y: 2,
    anim: false
};

// ====================
// DRAW FLOOR
// ====================
function drawFloor(x, y) {

    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(x*TILE, y*TILE, TILE, TILE);

    ctx.fillStyle = "#333";

    for (let i = 0; i < 6; i++) {

        const px = x*TILE + Math.random()*TILE;
        const py = y*TILE + Math.random()*TILE;

        ctx.fillRect(px, py, 2, 2);
    }
}

// ====================
// DRAW WALL
// ====================
function drawWall(x, y) {

    ctx.fillStyle = "#666";
    ctx.fillRect(x*TILE, y*TILE, TILE, TILE);

    ctx.fillStyle = "#888";

    for (let i = 0; i < TILE; i += 8) {

        ctx.fillRect(x*TILE, y*TILE+i, TILE, 1);
        ctx.fillRect(x*TILE+i, y*TILE, 1, TILE);
    }
}

// ====================
// HERO
// ====================
function drawHero(px, py) {

    const x = px * TILE;
    const y = py * TILE;

    // body
    ctx.fillStyle = "#2244cc";
    ctx.fillRect(x+10, y+12, 12, 14);

    // head
    ctx.fillStyle = "#ffcc99";
    ctx.beginPath();
    ctx.arc(x+16, y+9, 7, 0, Math.PI*2);
    ctx.fill();

    // hair
    ctx.fillStyle = "#663300";
    ctx.fillRect(x+9, y+2, 14, 5);

    // sword
    ctx.strokeStyle = "#dddddd";
    ctx.lineWidth = 3;

    if (player.anim) {

        ctx.beginPath();
        ctx.moveTo(x+6, y+18);
        ctx.lineTo(x+0, y+6);
        ctx.stroke();
    }
    else {

        ctx.beginPath();
        ctx.moveTo(x+6, y+18);
        ctx.lineTo(x+3, y+4);
        ctx.stroke();
    }

    // shield
    ctx.fillStyle = "#ccaa22";
    ctx.fillRect(x+22, y+14, 6, 10);

    ctx.fillStyle = "#2266cc";
    ctx.fillRect(x+23, y+15, 4, 8);

    // legs
    ctx.strokeStyle = "#000";

    if (player.anim) {

        ctx.beginPath();
        ctx.moveTo(x+13, y+26);
        ctx.lineTo(x+10, y+31);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x+19, y+26);
        ctx.lineTo(x+22, y+31);
        ctx.stroke();
    }
    else {

        ctx.beginPath();
        ctx.moveTo(x+13, y+26);
        ctx.lineTo(x+14, y+31);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x+19, y+26);
        ctx.lineTo(x+18, y+31);
        ctx.stroke();
    }
}

// ====================
// DRAW
// ====================
function draw() {

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for (let y = 0; y < MAP_H; y++) {

        for (let x = 0; x < MAP_W; x++) {

            if (map[y][x] === WALL) {
                drawWall(x, y);
            }
            else {
                drawFloor(x, y);
            }
        }
    }

    drawHero(player.x, player.y);

    // UI
    ctx.fillStyle = "white";
    ctx.font = "16px monospace";

    ctx.fillText(
        "Move: Arrow Keys / hjkl    Quit: q",
        10,
        canvas.height - 10
    );
}

draw();

// ====================
// MOVE
// ====================
function move(dx, dy) {

    const nx = player.x + dx;
    const ny = player.y + dy;

    if (map[ny][nx] === FLOOR) {

        player.x = nx;
        player.y = ny;

        player.anim = !player.anim;
    }

    draw();
}

// ====================
// INPUT
// ====================
document.addEventListener("keydown", e => {

    if (!running) return;

    switch(e.key) {

        case "ArrowLeft":
        case "h":
            move(-1,0);
            break;

        case "ArrowRight":
        case "l":
            move(1,0);
            break;

        case "ArrowUp":
        case "k":
            move(0,-1);
            break;

        case "ArrowDown":
        case "j":
            move(0,1);
            break;

        case "q":
            running = false;

            ctx.fillStyle = "red";
            ctx.font = "48px monospace";
            ctx.fillText(
                "GAME OVER",
                canvas.width/2 - 150,
                canvas.height/2
            );
            break;
    }
});
</script>

</body>
</html>
